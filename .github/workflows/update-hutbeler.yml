name: Update Hutbeler

on:
  schedule:
    - cron: '0 9 * * 5' # Her Cuma 09:00 UTC (12:00 TR)
  workflow_dispatch: # Manuel tetikleme

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer
        run: npm install --no-save puppeteer

      - name: Run scraper
        run: npx ts-node scripts/scrape-hutbeler.ts

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/assets/data/hutbeler.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/assets/data/hutbeler.json
          git commit -m "chore: update hutbeler data $(date +%Y-%m-%d)"
          git push
